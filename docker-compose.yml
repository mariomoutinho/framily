name: framily

services:
  # -----------------------------
  # Frontend: Next.js 15
  # -----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: framily_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
    env_file:
      - ./frontend/.env.local
    depends_on:
      - nginx
    networks:
      - framily

  # -----------------------------
  # Backend: Laravel (PHP-FPM)
  # -----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: framily_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-framily.ini:ro
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - framily

  # -----------------------------
  # nginx: serve o Laravel
  # -----------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: framily_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - framily

  # -----------------------------
  # MySQL 8
  # -----------------------------
  mysql:
    image: mysql:8.0
    container_name: framily_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-framily}
      MYSQL_USER: ${DB_USERNAME:-framily}
      MYSQL_PASSWORD: ${DB_PASSWORD:-framily}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - framily

volumes:
  frontend_node_modules:
  backend_vendor:
  mysql_data:

networks:
  framily:
    driver: bridge
